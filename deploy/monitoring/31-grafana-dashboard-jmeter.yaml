apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-jmeter
  namespace: monitoring
data:
  jmeter-load.json: |
    {
      "uid": "jmeter-load",
      "title": "JMeter - Carga (cliente)",
      "tags": ["jmeter", "performance"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "application",
            "label": "Aplicacion",
            "type": "query",
            "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
            "query": "SHOW TAG VALUES FROM \"jmeter\" WITH KEY = \"application\"",
            "refresh": 2,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Throughput (req/s)",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 20 } } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT sum(\"count\") / 5 FROM \"jmeter\" WHERE (\"transaction\" = 'all') AND $timeFilter GROUP BY time(5s) fill(null)",
              "resultFormat": "time_series"
            }
          ]
        },
        {
          "id": 2,
          "title": "Response time (ms)",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": { "defaults": { "unit": "ms", "custom": { "drawStyle": "line", "fillOpacity": 10 } } },
          "targets": [
            {
              "refId": "A", "alias": "avg",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT mean(\"avg\") FROM \"jmeter\" WHERE (\"transaction\" = 'all') AND $timeFilter GROUP BY time($__interval) fill(null)",
              "resultFormat": "time_series"
            },
            {
              "refId": "B", "alias": "p95",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT mean(\"pct95.0\") FROM \"jmeter\" WHERE (\"transaction\" = 'all') AND $timeFilter GROUP BY time($__interval) fill(null)",
              "resultFormat": "time_series"
            },
            {
              "refId": "C", "alias": "p99",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT mean(\"pct99.0\") FROM \"jmeter\" WHERE (\"transaction\" = 'all') AND $timeFilter GROUP BY time($__interval) fill(null)",
              "resultFormat": "time_series"
            }
          ]
        },
        {
          "id": 3,
          "title": "Errores (err/s)",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "color": { "mode": "fixed", "fixedColor": "red" }, "custom": { "drawStyle": "bars", "fillOpacity": 60 } } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT sum(\"countError\") / 5 FROM \"jmeter\" WHERE (\"transaction\" = 'all') AND $timeFilter GROUP BY time(5s) fill(null)",
              "resultFormat": "time_series"
            }
          ]
        },
        {
          "id": 4,
          "title": "Hilos activos (usuarios virtuales)",
          "type": "timeseries",
          "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 20 } } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "influxdb", "uid": "influxdb-jmeter" },
              "rawQuery": true,
              "query": "SELECT max(\"meanAT\") FROM \"jmeter\" WHERE (\"transaction\" = 'internal') AND $timeFilter GROUP BY time($__interval) fill(null)",
              "resultFormat": "time_series"
            }
          ]
        }
      ]
    }
