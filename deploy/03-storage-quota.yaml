# PVC RWX compartido para artefactos (.jmx, .jtl, reportes) + ResourceQuota
# que acota el consumo de los workers (seccion 10/12 del plan).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jmeter-artifacts
  namespace: jmeter-workers
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  # storageClassName: azurefile   # ajustar a la clase RWX disponible en el cluster
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workers-quota
  namespace: jmeter-workers
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    count/jobs.batch: "50"
    pods: "60"
