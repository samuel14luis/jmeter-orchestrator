# API objetivo (SUT) para pruebas de performance
quarkus.application.name=target-api
quarkus.http.port=8080

# Micrometer / Prometheus
# El endpoint de metricas queda en /q/metrics (formato Prometheus).
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.jvm=true
quarkus.micrometer.binder.system=true
quarkus.micrometer.binder.http-server.enabled=true

# Publicar percentiles/histograma de latencia HTTP para poder ver p95/p99
quarkus.micrometer.binder.http-server.max-uri-tags=100
quarkus.micrometer.export.prometheus.default-registry=true

# Histograma nativo de http_server_requests (buckets + percentiles cliente)
quarkus.micrometer.binder-enabled-default=true
