# =====================================================================
#  InfluxDB 1.8 - receptor del Backend Listener de JMeter
#  Base de datos 'jmeter' creada al arranque. Sin auth (entorno de prueba).
#  Almacenamiento efimero (emptyDir): los datos se pierden al reiniciar.
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: monitoring
  labels: { app: influxdb }
spec:
  replicas: 1
  selector:
    matchLabels: { app: influxdb }
  template:
    metadata:
      labels: { app: influxdb }
    spec:
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
          env:
            - { name: INFLUXDB_DB, value: "jmeter" }
            - { name: INFLUXDB_HTTP_AUTH_ENABLED, value: "false" }
            - { name: INFLUXDB_REPORTING_DISABLED, value: "true" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: monitoring
  labels: { app: influxdb }
spec:
  selector: { app: influxdb }
  ports:
    - name: http
      port: 8086
      targetPort: 8086
