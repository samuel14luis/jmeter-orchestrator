# =====================================================================
#  Despliegue LOCAL (minikube, single-node) del orquestador.
#
#  A diferencia de deploy/04-orchestrator.yaml (topologia de produccion, ns
#  jmeter-orchestrator), aqui el orquestador vive en el MISMO namespace que los
#  workers (jmeter-workers) para poder compartir el PVC RWX jmeter-artifacts en
#  un cluster de un solo nodo (evita el problema de PVC cross-namespace).
#
#  La base de datos sigue siendo el SQL Server que corre en Docker en el HOST;
#  el pod la alcanza via host.minikube.internal:1433.
#
#  Requisitos previos:
#    - imagenes jmeter-orchestrator:0.1.0 y jmeter-worker:5.6.3 en minikube
#    - deploy/03-storage-quota.yaml aplicado (PVC jmeter-artifacts + quota)
#    - Role worker-job-manager en jmeter-workers (deploy/02-rbac.yaml)
# =====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: jmeter-workers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-worker-job-manager-local
  namespace: jmeter-workers
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: jmeter-workers
roleRef:
  kind: Role
  name: worker-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: jmeter-workers
  labels:
    app.kubernetes.io/name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
        - name: orchestrator
          image: jmeter-orchestrator:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: "jdbc:sqlserver://host.minikube.internal:1433;databaseName=jmeter_orchestrator;encrypt=true;trustServerCertificate=true"
            - name: DB_USERNAME
              value: "sa"
            - name: DB_PASSWORD
              value: "Your_strong_Passw0rd"
            - name: K8S_WORKER_NAMESPACE
              value: jmeter-workers
            - name: WORKER_IMAGE
              value: jmeter-worker:5.6.3
            - name: ARTIFACTS_PVC
              value: jmeter-artifacts
            - name: ARTIFACTS_MOUNT
              value: /artifacts
            - name: STORAGE_KIND
              value: local
            - name: STORAGE_BASE_DIR
              value: /artifacts
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: jmeter-artifacts
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: jmeter-workers
spec:
  selector:
    app.kubernetes.io/name: orchestrator
  ports:
    - port: 80
      targetPort: 8080
