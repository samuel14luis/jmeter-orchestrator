# =====================================================================
#  JMeter Orchestrator - configuracion
# =====================================================================

quarkus.application.name=jmeter-orchestrator
quarkus.http.port=8080

# ---------------------------------------------------------------------
#  Base de datos: Microsoft SQL Server
# ---------------------------------------------------------------------
quarkus.datasource.db-kind=mssql
quarkus.datasource.username=${DB_USERNAME:sa}
quarkus.datasource.password=${DB_PASSWORD:Your_strong_Passw0rd}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=jmeter_orchestrator;encrypt=true;trustServerCertificate=true}
quarkus.datasource.jdbc.max-size=16

# Hibernate: el esquema lo gestiona Flyway, no Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
# Los campos Instant se persisten como DATETIME2 (no DATETIMEOFFSET). Por defecto
# Hibernate 6 mapea Instant a TIMESTAMP_UTC (datetimeoffset) en SQL Server, lo que
# choca con la migracion Flyway que usa DATETIME2. Forzamos TIMESTAMP para alinear.
quarkus.hibernate-orm.unsupported-properties."hibernate.type.preferred_instant_jdbc_type"=TIMESTAMP

# ---------------------------------------------------------------------
#  Flyway (migraciones T-SQL)
# ---------------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

# ---------------------------------------------------------------------
#  Kubernetes (Fabric8)
# ---------------------------------------------------------------------
# En cluster usa la ServiceAccount montada; en local usa ~/.kube/config
# Desactivar el Dev Service que intenta levantar un cluster efimero via Docker;
# en local no lo necesitamos (usamos ~/.kube/config si existe).
quarkus.kubernetes-client.devservices.enabled=false
orchestrator.k8s.namespace=${K8S_WORKER_NAMESPACE:jmeter-workers}
orchestrator.k8s.worker-image=${WORKER_IMAGE:jmeter-worker:5.6.3}
orchestrator.k8s.image-pull-policy=IfNotPresent
# recursos por pod worker
orchestrator.k8s.worker.cpu-request=500m
orchestrator.k8s.worker.cpu-limit=2
orchestrator.k8s.worker.mem-request=1Gi
orchestrator.k8s.worker.mem-limit=2Gi
# margen (segundos) que se suma a la duracion para activeDeadlineSeconds
orchestrator.k8s.deadline-margin-seconds=120
orchestrator.k8s.ttl-after-finished-seconds=600
# PVC RWX compartido entre orquestador y workers para artefactos
orchestrator.k8s.artifacts-pvc=${ARTIFACTS_PVC:jmeter-artifacts}
orchestrator.k8s.artifacts-mount=${ARTIFACTS_MOUNT:/artifacts}

# ---------------------------------------------------------------------
#  Almacen de artefactos (PVC RWX / directorio local montado)
# ---------------------------------------------------------------------
orchestrator.storage.kind=${STORAGE_KIND:local}
orchestrator.storage.local.base-dir=${STORAGE_BASE_DIR:./data/artifacts}

# ---------------------------------------------------------------------
#  Guardrails
# ---------------------------------------------------------------------
# tope global de hilos y pods por ejecucion
orchestrator.guardrails.max-threads=5000
orchestrator.guardrails.max-pods=20
# lista blanca de hosts destino por entorno (host=entorno)
orchestrator.guardrails.allowed-hosts[0]=localhost
orchestrator.guardrails.allowed-hosts[1]=httpbin.org
orchestrator.guardrails.allowed-hosts[2]=target-api.sut.svc.cluster.local

# ---------------------------------------------------------------------
#  Limites de subida de scripts
# ---------------------------------------------------------------------
quarkus.http.limits.max-body-size=25M
orchestrator.scripts.max-size-bytes=20971520

# ---------------------------------------------------------------------
#  OpenAPI / Swagger
# ---------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=JMeter Orchestrator API
quarkus.smallrye-openapi.info-version=0.1.0
quarkus.swagger-ui.always-include=true

# ---------------------------------------------------------------------
#  Perfil de test: SQL Server efimero via Testcontainers (dev services)
# ---------------------------------------------------------------------
%test.quarkus.datasource.db-kind=mssql
%test.quarkus.flyway.migrate-at-start=true
