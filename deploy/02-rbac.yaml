# RBAC minimo (Fase 0): el orquestador gestiona Jobs y observa Pods en el
# namespace de workers, nada mas.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: jmeter-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-job-manager
  namespace: jmeter-workers
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-worker-job-manager
  namespace: jmeter-workers
subjects:
  - kind: ServiceAccount
    name: orchestrator
    namespace: jmeter-orchestrator
roleRef:
  kind: Role
  name: worker-job-manager
  apiGroup: rbac.authorization.k8s.io
