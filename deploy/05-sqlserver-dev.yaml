# SQL Server para entornos NO productivos (dev/test). En produccion usar una
# instancia gestionada (Azure SQL) y apuntar el Secret orchestrator-db a ella.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: jmeter-orchestrator
  labels:
    app.kubernetes.io/name: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sqlserver
    spec:
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          ports:
            - containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_SA_PASSWORD
              value: "Your_strong_Passw0rd"
            - name: MSSQL_PID
              value: "Developer"
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/opt/mssql
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: jmeter-orchestrator
spec:
  selector:
    app.kubernetes.io/name: sqlserver
  ports:
    - port: 1433
      targetPort: 1433
